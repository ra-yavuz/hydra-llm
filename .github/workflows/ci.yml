name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lint deps
        run: sudo apt-get update && sudo apt-get install -y shellcheck python3-yaml
      - name: Shellcheck + py_compile
        run: make lint

  build-deb:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev zip
      - name: Build .deb packages
        run: bash scripts/build-deb.sh
      - name: Inspect .deb packages
        run: |
          for d in dist/*.deb; do
            echo "=== $d ==="
            dpkg-deb -I "$d"
            dpkg-deb -c "$d" | head -30
          done
      - name: Build plasmoid bundle
        run: |
          cd plasmoid
          mkdir -p ../dist
          zip -qr ../dist/hydra-llm.plasmoid metadata.json contents/
          ls -la ../dist/hydra-llm.plasmoid
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build-deb
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.plasmoid
          generate_release_notes: true
