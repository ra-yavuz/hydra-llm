# hydra-llm shipped catalog. All entries point to community-quantized GGUFs that
# can be downloaded anonymously (no Hugging Face account or token required).
#
# Sizes are the actual content-length in GB rounded to two decimals.
# Each entry's `recommended_for` lists the hardware tiers it is appropriate for
# (see `hydra-llm doctor` for tier detection).
#
# Field reference:
#   id              short alias used on the CLI
#   name            human-readable label
#   filename        local filename to save as (under models_dir)
#   url             direct download URL
#   sha256          optional, verified after download
#   size_gb         file size in gigabytes
#   needs_ram_gb    minimum system RAM (model + working set + OS)
#   fits_in_vram_gb if your GPU has at least this much VRAM, weights fit fully
#   default_port    preferred host port when started
#   gpu_layers      number of layers to offload (99 = all)
#   recommended_for hardware tiers this model is suitable for
#   license         informational; consult the model card for actual terms
#   tags            free-form, used by future filters
#   notes           short context for the user

models:

  # --- starter / sanity-check tier ---
  # Used by `hydra-llm setup` as the first-run smoke test. ~100 MB, downloads
  # in seconds, boots in seconds. The output quality is poor (it's a 135M-param
  # toy), but the goal is to prove the install works end to end. Don't use it
  # for real chat.
  - id: smollm2-135m
    name: "SmolLM2 135M Instruct (Q4_K_M)"
    filename: SmolLM2-135M-Instruct-Q4_K_M.gguf
    url: https://huggingface.co/bartowski/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q4_K_M.gguf
    size_gb: 0.10
    needs_ram_gb: 1
    fits_in_vram_gb: 1
    default_port: 18079
    gpu_layers: 99
    recommended_for: [tiny, laptop]
    license: Apache-2.0
    tags: [smoke-test, smallest]
    notes: "Throwaway smoke-test model. Output is poor by design; use a bigger model for real work."

